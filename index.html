<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070d14" />
  <title>PulseNews</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #070d14; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes glow { 0%,100%{box-shadow:0 0 8px #4ade80} 50%{box-shadow:0 0 16px #4ade80} }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    .app-wrapper {
      min-height: 100vh;
      background: linear-gradient(135deg, #070d14 0%, #0a1628 50%, #070d14 100%);
      position: relative;
      overflow-x: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(56,189,248,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow-1 {
      position: fixed; top: -150px; right: -150px; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(240,180,41,0.05) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .bg-glow-2 {
      position: fixed; bottom: -150px; left: -150px; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(56,189,248,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      max-width: 960px; margin: 0 auto; padding: 24px 16px;
    }

    /* Header */
    .header { margin-bottom: 24px; animation: fadeIn 0.5s ease; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
    .live-badge { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: glow 2s ease-in-out infinite; }
    .live-text { font-family: 'Space Mono', monospace; font-size: 10px; color: #4ade80; letter-spacing: 0.15em; }
    .app-title { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 6vw, 40px); font-weight: 400; color: #f0f4f8; letter-spacing: -0.02em; line-height: 1; }
    .app-title span { color: #f0b429; }
    .app-date { font-family: 'Space Mono', monospace; font-size: 10px; color: #475569; margin-top: 6px; text-transform: capitalize; }
    .clock { font-family: 'Space Mono', monospace; font-size: clamp(22px, 4.5vw, 32px); color: #f0b429; letter-spacing: 0.05em; text-align: right; }
    .last-updated { font-family: 'Space Mono', monospace; font-size: 9px; color: #334155; margin-top: 4px; text-align: right; }

    /* Market bar */
    .market-bar {
      margin-top: 16px; padding: 12px 18px;
      background: rgba(240,180,41,0.04);
      border: 1px solid rgba(240,180,41,0.12);
      border-radius: 12px;
      display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
      animation: fadeIn 0.6s ease;
    }
    .market-item { display: flex; gap: 8px; align-items: center; }
    .market-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #64748b; }
    .market-val { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; }
    .market-val.pos { color: #4ade80; }
    .market-val.neg { color: #f87171; }
    .market-val.neu { color: #94a3b8; }
    .market-sentiment { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #475569; margin-left: auto; }

    /* Controls */
    .controls { display: flex; gap: 8px; margin-top: 16px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); padding: 4px; border-radius: 10px; }
    .tab-btn {
      padding: 7px 16px; border-radius: 8px; font-size: 11px; font-weight: 500;
      border: none; transition: all 0.2s; font-family: 'DM Sans', sans-serif; color: #64748b;
      background: transparent;
    }
    .tab-btn.active { background: #f0b429; color: #070d14; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid rgba(240,180,41,0.2); background: transparent;
      color: #f0b429; font-size: 11px; font-family: 'Space Mono', monospace;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(240,180,41,0.06); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spin { display: inline-block; }
    .spinning { animation: spin 1s linear infinite; }

    /* News grid */
    .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .news-grid { grid-template-columns: 1fr; } }
    .news-grid.single { grid-template-columns: 1fr; }

    /* Section header */
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .section-icon.fin { background: rgba(240,180,41,0.15); }
    .section-icon.gen { background: rgba(56,189,248,0.12); }
    .section-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.1em; }
    .section-label.fin { color: #f0b429; }
    .section-label.gen { color: #38bdf8; }
    .section-line { flex: 1; height: 1px; }
    .section-line.fin { background: rgba(240,180,41,0.12); }
    .section-line.gen { background: rgba(56,189,248,0.08); }

    /* News card */
    .news-card {
      display: block; margin-bottom: 10px; border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 16px 18px; transition: all 0.2s ease;
      position: relative; overflow: hidden; animation: fadeIn 0.5s ease;
    }
    .news-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-1px); }
    .news-card.fin:hover { border-color: rgba(240,180,41,0.25); }
    .news-card.gen:hover { border-color: rgba(56,189,248,0.2); }
    .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 12px 0 0 12px; opacity: 0.7; }
    .card-accent.fin { background: #f0b429; }
    .card-accent.gen { background: #38bdf8; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 7px; }
    .card-tags { display: flex; align-items: center; gap: 6px; }
    .tag { font-family: 'Space Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
    .tag-num.fin { color: #f0b429; background: rgba(240,180,41,0.12); }
    .tag-num.gen { color: #38bdf8; background: rgba(56,189,248,0.1); }
    .tag-info { color: #64748b; background: rgba(100,116,139,0.1); }
    .card-change { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .card-change.pos { color: #4ade80; }
    .card-change.neg { color: #f87171; }
    .card-title { font-family: 'DM Serif Display', serif; font-size: 13px; font-weight: 400; color: #e2e8f0; line-height: 1.4; margin-bottom: 7px; }
    .card-summary { font-size: 11px; color: #64748b; line-height: 1.55; margin-bottom: 9px; }
    .card-source { font-family: 'Space Mono', monospace; font-size: 10px; color: #475569; }

    /* Skeleton */
    .skeleton { animation: pulse 1.5s ease-in-out infinite; }
    .skel-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
    .skel-line { background: rgba(255,255,255,0.06); border-radius: 4px; margin-bottom: 8px; }

    /* Error */
    .error-box { padding: 16px; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: 10px; color: #f87171; font-size: 13px; margin-bottom: 16px; }

    /* Footer */
    .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .footer span { font-family: 'Space Mono', monospace; font-size: 9px; color: #1e3a5f; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="bg-grid"></div>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div>
          <div class="live-badge">
            <div class="live-dot"></div>
            <span class="live-text">EN VIVO</span>
          </div>
          <h1 class="app-title">Pulse<span>News</span></h1>
          <p class="app-date" id="dateDisplay"></p>
        </div>
        <div>
          <div class="clock" id="clockDisplay">--:--:--</div>
          <div class="last-updated" id="lastUpdated"></div>
        </div>
      </div>

      <!-- Market bar -->
      <div class="market-bar" id="marketBar" style="display:none">
        <div class="market-item">
          <span class="market-label">S&P 500</span>
          <span class="market-val" id="sp500Val">—</span>
        </div>
        <div class="market-item">
          <span class="market-label">NASDAQ</span>
          <span class="market-val" id="nasdaqVal">—</span>
        </div>
        <div class="market-item">
          <span class="market-label">DOW</span>
          <span class="market-val" id="dowVal">—</span>
        </div>
        <span class="market-sentiment" id="marketSentiment"></span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="tabs">
          <button class="tab-btn active" onclick="setTab('all')">Todo</button>
          <button class="tab-btn" onclick="setTab('financial')">📈 Financiero</button>
          <button class="tab-btn" onclick="setTab('general')">🌍 General</button>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchNews()">
          <span class="spin" id="spinIcon">↻</span>
          <span id="refreshText">Actualizar</span>
        </button>
      </div>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox" style="display:none"></div>

    <!-- News Grid -->
    <div class="news-grid" id="newsGrid">
      <!-- Financial -->
      <div id="financialSection">
        <div class="section-header">
          <div class="section-icon fin">📈</div>
          <span class="section-label fin">FINANCIERO</span>
          <div class="section-line fin"></div>
        </div>
        <div id="financialCards" class="skeleton">
          ${[1,2,3,4,5].map(() => `
            <div class="skel-card">
              <div class="skel-line" style="height:12px;width:70%;margin-bottom:10px"></div>
              <div class="skel-line" style="height:10px;width:90%;margin-bottom:6px"></div>
              <div class="skel-line" style="height:10px;width:55%"></div>
            </div>`).join('')}
        </div>
      </div>
      <!-- General -->
      <div id="generalSection">
        <div class="section-header">
          <div class="section-icon gen">🌍</div>
          <span class="section-label gen">GENERAL</span>
          <div class="section-line gen"></div>
        </div>
        <div id="generalCards" class="skeleton">
          ${[1,2,3,4,5].map(() => `
            <div class="skel-card">
              <div class="skel-line" style="height:12px;width:70%;margin-bottom:10px"></div>
              <div class="skel-line" style="height:10px;width:90%;margin-bottom:6px"></div>
              <div class="skel-line" style="height:10px;width:55%"></div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>PULSENEWS · POWERED BY CLAUDE AI</span>
      <span id="footerCount">—</span>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Eres un asistente de noticias financieras y generales. Tu tarea es buscar las noticias más importantes del día usando web search.
IMPORTANTE: Devuelve ÚNICAMENTE un objeto JSON válido, sin texto adicional, sin backticks, sin markdown. Solo el JSON puro.
Estructura requerida exacta:
{
  "financial": [{"title":"...","summary":"...","source":"...","url":"...","ticker":null,"change":null,"sentiment":"neutral"}],
  "general": [{"title":"...","summary":"...","source":"...","url":"...","category":"Internacional"}],
  "marketSnapshot": {"sp500":"...","nasdaq":"...","dow":"...","sentiment":"..."}
}
Exactamente 5 noticias financieras y 5 generales. Todas de HOY o últimas horas. Incluye URLs reales.`;

let currentTab = 'all';
let newsData = null;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    now.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('es-ES', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(updateClock, 1000);
updateClock();

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['all','financial','general'][i] === tab);
  });
  const grid = document.getElementById('newsGrid');
  const fin = document.getElementById('financialSection');
  const gen = document.getElementById('generalSection');
  if (tab === 'all') {
    grid.classList.remove('single');
    fin.style.display = ''; gen.style.display = '';
  } else if (tab === 'financial') {
    grid.classList.add('single');
    fin.style.display = ''; gen.style.display = 'none';
  } else {
    grid.classList.add('single');
    fin.style.display = 'none'; gen.style.display = '';
  }
}

function getChangeClass(val) {
  if (!val) return '';
  if (val.startsWith('+')) return 'pos';
  if (val.startsWith('-')) return 'neg';
  return 'neu';
}

function renderCard(item, type, index) {
  const isFin = type === 'financial';
  const cls = isFin ? 'fin' : 'gen';
  const changeHtml = (isFin && item.change)
    ? `<span class="card-change ${getChangeClass(item.change)}">${item.change}</span>` : '';
  const tagHtml = (isFin && item.ticker)
    ? `<span class="tag tag-info">${item.ticker}</span>` : '';
  const catHtml = (!isFin && item.category)
    ? `<span class="tag tag-info">${item.category}</span>` : '';
  return `
    <a class="news-card ${cls}" href="${item.url || '#'}" target="_blank" rel="noopener noreferrer">
      <div class="card-accent ${cls}"></div>
      <div class="card-meta">
        <div class="card-tags">
          <span class="tag tag-num ${cls}">${String(index+1).padStart(2,'0')}</span>
          ${tagHtml}${catHtml}
        </div>
        ${changeHtml}
      </div>
      <p class="card-title">${item.title}</p>
      <p class="card-summary">${item.summary}</p>
      <span class="card-source">${item.source || ''}</span>
    </a>`;
}

function renderMarket(snapshot) {
  if (!snapshot) return;
  const bar = document.getElementById('marketBar');
  bar.style.display = 'flex';
  const setVal = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val || '—';
    el.className = 'market-val ' + getChangeClass(val);
  };
  setVal('sp500Val', snapshot.sp500);
  setVal('nasdaqVal', snapshot.nasdaq);
  setVal('dowVal', snapshot.dow);
  document.getElementById('marketSentiment').textContent = snapshot.sentiment || '';
}

async function fetchNews() {
  const btn = document.getElementById('refreshBtn');
  const spin = document.getElementById('spinIcon');
  const txt = document.getElementById('refreshText');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  spin.classList.add('spinning');
  txt.textContent = 'Cargando...';
  errorBox.style.display = 'none';

  // Show skeletons
  ['financialCards','generalCards'].forEach(id => {
    document.getElementById(id).classList.add('skeleton');
    document.getElementById(id).innerHTML = [1,2,3,4,5].map(() => `
      <div class="skel-card">
        <div class="skel-line" style="height:12px;width:70%;margin-bottom:10px"></div>
        <div class="skel-line" style="height:10px;width:90%;margin-bottom:6px"></div>
        <div class="skel-line" style="height:10px;width:55%"></div>
      </div>`).join('');
  });

  try {
    const today = new Date().toLocaleDateString('es-ES', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2500,
        tools: [{type:'web_search_20250305',name:'web_search'}],
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: `Hoy es ${today}. Busca y devuelve las 5 noticias financieras más importantes de HOY (acciones, ETF, Nasdaq, S&P500, Wall Street, mercados) y las 5 noticias generales más importantes del mundo de HOY. Devuelve SOLO el JSON sin nada más.`
        }]
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found');
    newsData = JSON.parse(match[0]);

    // Render
    document.getElementById('financialCards').classList.remove('skeleton');
    document.getElementById('financialCards').innerHTML =
      (newsData.financial || []).map((item, i) => renderCard(item, 'financial', i)).join('');
    document.getElementById('generalCards').classList.remove('skeleton');
    document.getElementById('generalCards').innerHTML =
      (newsData.general || []).map((item, i) => renderCard(item, 'general', i)).join('');

    renderMarket(newsData.marketSnapshot);
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'actualizado ' + now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('footerCount').textContent = '10 NOTICIAS · HOY';

  } catch (err) {
    errorBox.textContent = '⚠️ Error al cargar noticias. Intenta de nuevo.';
    errorBox.style.display = 'block';
    console.error(err);
  } finally {
    btn.disabled = false;
    spin.classList.remove('spinning');
    txt.textContent = 'Actualizar';
  }
}

fetchNews();
</script>
</body>
</html>
